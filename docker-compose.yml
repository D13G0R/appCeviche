version: "3.9"

services:
  db:
    image: mysql:8.0
    container_name: appceviche_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: DbCevicheDocker
      MYSQL_USER: appUserDocker
      MYSQL_PASSWORD: user_password_docker
      MYSQL_ROOT_PASSWORD: password_special_root
      TZ: America/Bogota
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      # CORRECCIÓN 1: Usar el usuario 'root' y su contraseña para el chequeo.
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-ppassword_special_root"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: appceviche_web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_NAME: DbCevicheDocker
      DB_USER: appUserDocker
      DB_PASSWORD: user_password_docker
      # CORRECCIÓN 2: El host es el nombre del servicio, no 127.0.0.1
      DB_HOST: db 
      DB_PORT: "3306"
      DJANGO_SETTINGS_MODULE: appCeviche.settings
      TZ: America/Bogota
    ports:
      - "8000:8000"
    command: ["gunicorn", "-b", "0.0.0.0:8000", "appCeviche.wsgi:application"]

volumes:
  mysql_data: